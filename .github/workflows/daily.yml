name: EC Docsroom Daily Notifier

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC = 약 07:00 KST (지연 여유 포함)
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 스크립트 실행
        run: python main.py
