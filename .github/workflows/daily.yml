name: EUR-Lex EN 50566 RSS Monitor

on:
  schedule:
    - cron: "30 21 * * *"   # 매일 21:30 UTC = 약 07:00 KST
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: 의존성 설치
        run: |
          pip install feedparser requests
      
      - name: EUR-Lex RSS 모니터링 실행
        run: python main.py
      
      - name: 변경사항 커밋 (Git 설정)
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add feed.json feed_previous.json || true
          git commit -m "Update feed cache [skip ci]" || true
          git push || true
